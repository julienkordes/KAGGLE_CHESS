  // Common Dimensions.
  const canvasSize = Math.min(height, width);
  const boardSize = canvasSize * 0.8;
  const squareSize = boardSize / 8;
  const offset = (canvasSize - boardSize) / 2;

  // Canvas Setup.
  let canvas = parent.querySelector("canvas");
  if (!canvas) {
    canvas = document.createElement("canvas");
    parent.appendChild(canvas);
  }

  // Create the Download PGN button
  let downloadButton = parent.querySelector("#copy-pgn");
  if (!downloadButton && environment.steps.length) {
    try {
      const board = environment.steps[0][0].observation.board;
      const info = environment.info;
      const agent1 = info?.TeamNames?.[0] || "Agent 1";
      const agent2 = info?.TeamNames?.[1] || "Agent 2";
      const game = new Chess();
      let result = environment.rewards ?? [];
      if (result.some((r) => r === undefined || r === null)) {
        result = result.map((r) => (r === undefined || r === null ? 0 : 1));
      }

      game.header(
        "Event",
        "FIDE & Google Efficient Chess AI Challenge (https://www.kaggle.com/competitions/fide-google-efficiency-chess-ai-challenge)",
        "White",
        agent1,
        "Black",
        agent2,
      );

      const openingIdx = OPENINGS.indexOf(board);
      const moves = MOVES[openingIdx].split(" ");

      for (let i = 0; i < moves.length; i++) {
        const move = moves[i];
        game.move({ from: move.slice(0, 2), to: move.slice(2, 4) });
      }

      for (let i = 1; i < environment.steps.length; i++) {
        const move = environment.steps[i][(i - 1) % 2].action;
        if (move.length === 4) {
          game.move({ from: move.slice(0, 2), to: move.slice(2, 4) });
        } else if (move.length === 5) {
          game.move({
            from: move.slice(0, 2),
            to: move.slice(2, 4),
            promotion: move.slice(4, 5),
          });
        }
      }

      let pgn = game.pgn();

      // for some reason the pgn doesn't calculate the result correctly
      // until we can fix this bug, remove it.
      // b/383366972
      if (pgn.indexOf(" 0-0") !== -1) {
        pgn = pgn.split(" 0-0")[0]
      }

      downloadButton = document.createElement("button");
      downloadButton.id = "copy-pgn";
      downloadButton.textContent = "Copy PGN";
      downloadButton.style.position = "absolute";
      downloadButton.style.top = "10px";
      downloadButton.style.left = "10px";
      downloadButton.style.zIndex = 1;
      if(!environment.viewer) {
        parent.appendChild(downloadButton);
      }

      downloadButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(pgn);
          alert("PGN Copied");
          return;
        } catch (err) {
          console.info(
            "Clipboard access failed. Fall back to display for manual copy."
          );
        }

        try {
          const pgnDiv = document.createElement("div");
          downloadButton.textContent = "";
          pgnDiv.style.position = "absolute";
          pgnDiv.style.top = "8px";
          pgnDiv.style.left = "8px";
          pgnDiv.style.zIndex = 2;
          pgnDiv.style.border = "1px solid black";
          pgnDiv.style.padding = "8px";
          pgnDiv.style.background = "#FFFFFF";
          pgnDiv.style.fontFamily = "monospace";
          pgnDiv.style.whiteSpace = "pre-wrap";

          // Split the PGN into lines and add each to a span for better formatting
          const pgnLines = pgn.split("\n");
          pgnLines.forEach((line) => {
            const lineSpan = document.createElement("span");
            lineSpan.textContent = line + "\n";
            pgnDiv.appendChild(lineSpan);
          });
          parent.appendChild(pgnDiv);
          const closeButton = document.createElement("span");
          closeButton.textContent = "×";
          closeButton.style.position = "absolute";
          closeButton.style.top = "5px";
          closeButton.style.right = "5px";
          closeButton.style.cursor = "pointer";
          closeButton.style.float = "right";
          closeButton.style.fontSize = "16px";
          closeButton.style.marginLeft = "5px";
          closeButton.addEventListener("click", () => {
            downloadButton.textContent = "Copy PGN";
            parent.removeChild(pgnDiv);
          });
          pgnDiv.appendChild(closeButton);
        } catch (e) {
          console.error("Cannot display div");
          alert("PGN cannot be generated");
        }
      });
    } catch (e) {
      console.error("Cannot create game pgn");
      console.error(e);
    }
  }

  // Canvas setup and reset.
  let c = canvas.getContext("2d");
  canvas.width = canvasSize;
  canvas.height = canvasSize;
  c.clearRect(0, 0, canvas.width, canvas.height);
  // Draw the Chessboard
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const x = col * squareSize + offset;
      const y = row * squareSize + offset;

      // Alternate colors for squares
      c.fillStyle = (row + col) % 2 === 0 ? "#FFCE9E" : "#D18B47";
      c.fillRect(x, y, squareSize, squareSize);
    }
  }
  // Draw the team names and game status
  if (!environment.viewer) {
    const info = environment.info;
    const agent1 = info?.TeamNames?.[0] || "Agent 1";
    const agent2 = info?.TeamNames?.[1] || "Agent 2";
    const firstGame = environment.steps[step][0].observation.mark == "white";
    const fontSize = Math.round(0.33 * offset);
    c.font = `${fontSize}px sans-serif`;
    c.fillStyle = "#FFFFFF";
    const agent1Reward = environment.steps[step][0].reward;
    const agent2Reward = environment.steps[step][1].reward;
    const charCount = agent1.length + agent2.length + 12;
    const title = `${
      firstGame ? "\u25A0" : "\u25A1"
    }${agent1} (${agent1Reward}) vs ${
      firstGame ? "\u25A1" : "\u25A0"
    }${agent2} (${agent2Reward})`;
    c.fillText(
      title,
      offset + 4 * squareSize - Math.floor((charCount * fontSize) / 4),
      40
    );
  }

  // Draw the Pieces
  const board = environment.steps[step][0].observation.board;
  const chess = new Chess(board);
  const boardObj = chess.board();

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const piece = boardObj[row][col];
      if (piece) {
        const x = col * squareSize + offset;
        const y = row * squareSize + offset;
        drawPiece(c, piece.type, piece.color, x, y, squareSize);
      }
    }
  }
}

// Create an object to store the Image objects
const pieceImages = {};

// Function to initialize the piece images
function initializePieceImages() {
  const pieces = ["P", "R", "N", "B", "Q", "K"];
  pieces.forEach((piece) => {
    const whiteChar = piece.toLowerCase();
    const blackChar = piece.toUpperCase();
    const whiteImg = new Image();
    const blackImg = new Image();
    whiteImg.src = pieceImagesSrc[whiteChar];
    blackImg.src = pieceImagesSrc[blackChar];
    pieceImages[whiteChar] = whiteImg;
    pieceImages[blackChar] = blackImg;
  });
}

initializePieceImages();

// Helper function to draw individual pieces
function drawPiece(c, type, color, x, y, size) {
  const pieceCode = color === "w" ? type.toLowerCase() : type.toUpperCase();
  const img = pieceImages[pieceCode];

  if (img) {
    c.drawImage(img, x, y, size, size);
  } else {
    // Fallback to drawing a symbol if the image is not loaded
    const pieceSymbols = {
      P: "♙",
      R: "♖",
      N: "♘",
      B: "♗",
      Q: "♕",
      K: "♔",
      p: "♟",
      r: "♜",
      n: "♞",
      b: "♝",
      q: "♛",
      k: "♚",
    };

    c.font = `${size * 0.8}px Arial`;
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillStyle = color === "w" ? "white" : "black";
    c.fillText(pieceSymbols[pieceCode], x + size / 2, y + size / 2);
  }
};

        useEffect(() => {
          const element = ref.current;

          // A single function to render a static frame (for resizes and step changes)
          const renderStaticFrame = async () => {
            if (!ref.current) return;
            try {
              // Pass a frame of 1 to indicate a final/static state
              await renderer({
                ...context,

            renderStaticFrame();
          });
          observer.observe(element);

          // --- Animation Loop ---
          let start = Date.now();
          const renderAnimation = async () => {

          return () => {
            observer.disconnect();
            cancelAnimationFrame(animationFrameId.current);

      const App = () => {
        const renderCountRef = useRef(0);
        const [_, setRenderCount] = useState(0);

        // These are bindings to the 0-9 keys and are milliseconds of timeout per step
        const speeds = [
          0,
          3000,
          1000,
          500,
          333, // Default
          200,
          100,
          50,
          25,
          10,
        ];

        const contextRef = useRef({
          animate: false,
          agents: [],
          controls: false,
          debug: false,
          environment: { steps: [], info: {} },
          header: window.innerHeight >= 600,
          height: window.innerHeight,
          interactive: false,
          legend: true,
          loading: false,
          playing: false,
          processing: false,
          renderer: () => "DNE",
          settings: false,
          speed: speeds[4],
          step: 0,
          width: window.innerWidth,
        });

        // Context helpers.
        const rerender = (contextRef.current.rerender = () =>
          setRenderCount((renderCountRef.current += 1)));
        const setStep = (contextRef.current.setStep = (newStep) => {
          contextRef.current.step = newStep;
          rerender();
        });
        const setPlaying = (contextRef.current.setPlaying = (playing) => {
          contextRef.current.playing = playing;
          rerender();
        });
        const pause = (contextRef.current.pause = () => setPlaying(false));

        const playNext = () => {
          const context = contextRef.current;

          if (
            context.playing &&
            context.step < context.environment.steps.length - 1
          ) {
            setStep(context.step + 1);
            play(true);
          } else {
            pause();
          }
        };

        const play = (contextRef.current.play = (continuing) => {
          const context = contextRef.current;
          if (context.playing && !continuing) return;
          if (!context.playing) setPlaying(true);
          if (
            !continuing &&
            context.step === context.environment.steps.length - 1
          ) {
            setStep(0);
          }
          setTimeout(playNext, context.speed);
        });

        const updateContext = (o) => {
          const context = contextRef.current;
          Object.assign(context, o, {
            environment: { ...context.environment, ...(o.environment || {}) },
          });
          rerender();
        };

        // First time setup.
        useEffect(() => {
          // Timeout is used to ensure useEffect renders once.
          setTimeout(() => {
            // Initialize context with window.kaggle.
            updateContext(window.kaggle || {});

            if (window.kaggle?.playing) {
              play(true);
            }

            // Listen for messages received to update the context.
            window.addEventListener(
              "message",
              (event) => {
                // Ensure the environment names match before updating.
                try {
                  if (
                    event.data.environment?.name ==
                      contextRef.current.environment.name ||
                    (event.data.environment?.name &&
                      !contextRef.current.environment.name) ||
                    event.data.environment?.loading !==
                      contextRef.current.environment.loading
                  ) {
                    const nextContext = {
                      ...event.data,
                      environment: {
                        ...event.data.environment,
                        steps: event.data.environment?.steps ?? [],
                      },
                    };
                    if (
                      !nextContext.renderer ||
                      typeof nextContext.renderer !== "function"
                    ) {
                      nextContext.renderer = contextRef.current.renderer;
                    }
                    window.kaggle = nextContext;
                    updateContext(nextContext);
                  }
                  if (event.data.setSteps) {
                    const nextContext = {
                      ...(window.kaggle ?? {}),
                      environment: {
                        ...(window.kaggle?.environment ?? {}),
                        steps: event.data.setSteps,
                      },
                    };
                    if (
                      !nextContext.renderer ||
                      typeof nextContext.renderer !== "function"
                    ) {
                      nextContext.renderer = contextRef.current.renderer;
                    }

                    window.kaggle = nextContext;
                    updateContext(nextContext);
                  }

                  // Side load the renderer script if it is specified by the post message event and not already loaded.
                  const renderScriptId = "rendererScript";
                  if (
                    event.data.environment?.rendererUrl &&
                    !document.querySelector(`#${renderScriptId}`)
                  ) {
                    window.rendererUrl = event.data.environment?.rendererUrl;
                    const script = document.createElement("script");
                    script.id = renderScriptId;
                    script.onload = () => {
                      window.kaggle.renderer = window.renderer;
                    };
                    script.src = window.rendererUrl;
                    document.body.appendChild(script);
                  }
                } catch {}
              },
              false,
            );
            // Listen for keyboard commands.
            window.addEventListener(
              "keydown",
              (event) => {
                const {
                  interactive,
                  isInteractive,
                  playing,
                  step,
                  environment,
                } = contextRef.current;
                const key = event.keyCode;
                const zero_key = 48;
                const nine_key = 57;
                if (
                  interactive ||
                  isInteractive() ||
                  (key !== 32 &&
                    key !== 37 &&
                    key !== 39 &&
                    !(key >= zero_key && key <= nine_key))
                )
                  return;

                if (key === 32) {
                  playing ? pause() : play();
                } else if (key === 39) {
                  contextRef.current.playing = false;
                  if (step < environment.steps.length - 1) setStep(step + 1);
                  rerender();
                } else if (key === 37) {
                  contextRef.current.playing = false;
                  if (step > 0) setStep(step - 1);
                  rerender();
                } else if (key >= zero_key && key <= nine_key) {
                  contextRef.current.speed = speeds[key - zero_key];
                }
                event.preventDefault();
                return false;
              },
              false,
            );
          }, 1);
        }, []);

        if (contextRef.current.debug) {
          console.log("context", contextRef.current);
        }

        // Ability to update context.
        contextRef.current.update = updateContext;

        // Ability to communicate with ipython.
        const execute = (contextRef.current.execute = (source) =>
          new Promise((resolve, reject) => {
            try {
              window.parent.IPython.notebook.kernel.execute(source, {
                iopub: {
                  output: (resp) => {
                    const type = resp.msg_type;
                    if (type === "stream") return resolve(resp.content.text);
                    if (type === "error") return reject(new Error(resp.evalue));
                    return reject(new Error("Unknown message type: " + type));
                  },
                },
              });
            } catch (e) {
              reject(new Error("IPython Unavailable: " + e));
            }
          }));

        // Ability to return an action from an interactive session.
        contextRef.current.act = (action) => {
          const id = contextRef.current.environment.id;
          updateContext({ processing: true });
          execute(`
            import json
            from kaggle_environments import interactives
            if "${id}" in interactives:
                action = json.loads('${JSON.stringify(action)}')
                env, trainer = interactives["${id}"]
                trainer.step(action)
                print(json.dumps(env.steps))`)
            .then((resp) => {
              try {
                updateContext({
                  processing: false,
                  environment: { steps: JSON.parse(resp) },
                });
                play();
              } catch (e) {
                updateContext({ processing: resp.split("\n")[0] });
                console.error(resp, e);
              }
            })
            .catch((e) => console.error(e));
        };

        // Check if currently interactive.
        contextRef.current.isInteractive = () => {
          const context = contextRef.current;
          const steps = context.environment.steps;
          return (
            context.interactive &&
            !context.processing &&
            context.step === steps.length - 1 &&
            steps[context.step].some((s) => s.status === "ACTIVE")
          );
        };

        return h`
          <${Context.Provider} value=${contextRef.current}>
            <${Player} className="${contextRef.current.environment.viewer ? "no-border" : ""}" />
          <//>`;
      };

      preact.render(h`<${App} />`, document.body);
    </script>
  </body>
</html>
